name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@v2
        
      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config auto

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Composer install + audit
        run: |
          cd project
          echo "APP_ENV=prod" > .env
          echo "APP_SECRET=dummy" >> .env
          composer install --no-interaction --no-progress --no-scripts --ignore-platform-req=ext-redis
          composer audit || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.sources=project
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository }}/symfony-app:latest ./project

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/symfony-app:latest
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Push image to GHCR
        run: docker push ghcr.io/${{ github.repository }}/symfony-app:latest

      - name: Run OWASP ZAP scan
        run: |
          docker run --rm -t \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t ${{ secrets.NGROK_URL }} \
            -r zap-report.html || true

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.html

  deploy:
    needs: build-and-scan
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy application and WAF Ingress
        run: |
          # Injection du nom du repository GitHub dans le manifeste de déploiement
          sed -i "s|\${GITHUB_REPOSITORY}|$GITHUB_REPOSITORY|g" deployment.yaml
          
          # Autoriser les snippets ModSecurity pour le WAF
          kubectl patch configmap ingress-nginx-controller -n ingress-nginx -p '{"data": {"allow-snippet-annotations": "true"}}' || true
          
          # Déploiement K8s
          kubectl apply -f postgres-pvc.yaml
          kubectl apply -f postgres-deployment.yaml
          kubectl apply -f postgres-service.yaml
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml
          kubectl apply -f ingress.yaml
          kubectl rollout restart deployment/symfony-app
          
          # Attente que le pod redémarre
          kubectl rollout status deployment/symfony-app
          
          # Attendre que Postgres soit joignable avant de lancer la création des tables
          sleep 15
          kubectl exec deploy/symfony-app -- php bin/console doctrine:database:create --if-not-exists || true
          kubectl exec deploy/symfony-app -- php bin/console doctrine:schema:update --force

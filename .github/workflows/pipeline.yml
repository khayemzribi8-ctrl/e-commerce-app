name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  devsecops:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔐 Secrets scanning (FIXED)
      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            zricethezav/gitleaks:latest detect \
            --source=/repo \
            --no-git \
            --redact

      # 🔐 SAST (code analysis)
      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config auto

      # 🔐 Dependencies audit (PHP)
      - name: Composer audit
        run: |
          cd project
          composer install --no-interaction --no-progress --ignore-platform-req=ext-redis
          composer audit || true

      # 🐳 Build Docker image
      - name: Build Docker image
        run: docker build -t symfony-app:latest ./project

      # 🔐 Scan Docker image (Trivy)
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: symfony-app:latest
          severity: HIGH,CRITICAL
          exit-code: 0

security:
    # https://symfony.com/doc/current/security.html#registering-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch-user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                remember_me: false
            logout:
                path: app_logout
                target: app_home
                invalidate_session: true
                clear_site_data: true
                delete_cookies:
                    PHPSESSID:
                        path: /
                        samesite: lax

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/cart, roles: ROLE_USER }
        - { path: ^/order, roles: ROLE_USER }

    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
